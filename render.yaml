# Blueprint Render — API ML en sign_ai (https://signara-test.onrender.com)
# La web está en Netlify.

services:
  - type: web
    name: signara-test
    runtime: python
    rootDir: sign_ai
    buildCommand: pip install -r requirements_api.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
